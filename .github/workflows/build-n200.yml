name: Build and Release OnePlus N200 Kernel (dre)

# Based on the excellent work by:
# - Bouteillepleine/SukiSu_Ultra_Oneplus- (workflow template)
# - GarryStraitYT/android_kernel_oneplus_sm4350 (kernel source with SukiSU + SUSFS backported)
# https://github.com/GarryStraitYT/android_kernel_oneplus_sm4350
#
# Uses branch: 5.4.302-lineageos23.x (latest 5.4.302, LineageOS 23 base)
# With SUSFS backported from 5.10 to 5.4 (branch: susfs)
# And SukiSU integrated (branch: sukisu)

on:
  workflow_dispatch:
    inputs:
      make_release:
        description: 'Create a GitHub Release with the flashable ZIP'
        required: true
        type: boolean
        default: false
      ksu_version:
        description: 'SukiSU version (branch in GarryStraitYT repo: sukisu or sukisu-rebase)'
        required: false
        type: string
        default: 'sukisu'
      susfs_enabled:
        description: 'Enable SUSFS (uses susfs branch with backported SUSFS for 5.4)'
        required: false
        type: boolean
        default: true
      optimize_level:
        description: 'Compiler optimization level'
        required: true
        type: choice
        options:
          - O2
          - O3
        default: O2
      clean_build:
        description: 'Clean build (disable ccache)'
        type: boolean
        default: false
      build_timestamp:
        description: 'Custom kernel build timestamp for uname -a (RFC 2822 format)'
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup build environment
        run: |
          sudo apt-get -o Acquire::Retries=3 update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            repo git-core gnupg flex bison gperf build-essential \
            zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 \
            lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev \
            libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig \
            libncurses5 libncurses5-dev python3 python3-pip python3-venv \
            bc cpio rsync ccache libssl-dev ninja-build libelf-dev \
            aarch64-linux-gnu-gcc arm-linux-gnueabihf-gcc

      - name: Clone GarryStraitYT kernel source (with SukiSU + SUSFS)
        run: |
          mkdir -p build && cd build
          git clone --depth=1 --branch ${{ inputs.susfs_enabled && 'susfs' || inputs.ksu_version }} https://github.com/GarryStraitYT/android_kernel_oneplus_sm4350 kernel-5.4

      - name: Clone techpack (modules + dtb)
        run: |
          cd build
          git clone --depth=1 --branch oneplus/SM4350_R_11.0 https://github.com/OnePlusOSS/android_kernel_modules_and_devicetree_oneplus_sm4350 techpack

      - name: Fetch prebuilt clang from CodeLinaro
        run: |
          cd build
          mkdir -p kernel_platform/prebuilts-master/clang/host/linux-x86
          git clone --depth=1 --branch ks-kernel.lnx.1.0.r1-rel \
            https://git.codelinaro.org/clo/la/kernelplatform/prebuilts-master/clang/host/linux-x86 \
            kernel_platform/prebuilts-master/clang/host/linux-x86

      - name: Setup AnyKernel3
        run: |
          cd build
          git clone --depth=1 --branch gki-2.0 https://github.com/osm0sis/AnyKernel3

      - name: Apply N200-specific patches
        run: |
          cd build
          bash ../../scripts/apply_patches.sh

      - name: Configure kernel
        run: |
          cd build/kernel-5.4
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabihf-
          
          CLANG_PATH="../kernel_platform/prebuilts-master/clang/host/linux-x86/clang-r416183c/bin"
          if [ -d "$CLANG_PATH" ]; then
            export PATH="$CLANG_PATH:$PATH"
          fi
          export CC=clang
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          
          # Use the holi-qgki_defconfig from GarryStraitYT (for N200)
          make O=out holi-qgki_defconfig
          
          # KernelSU (already integrated in sukisu/susfs branches)
          ./scripts/config --file out/.config -e CONFIG_KSU
          
          # Networking
          ./scripts/config --file out/.config \
            -e CONFIG_TCP_CONG_BBR \
            -e CONFIG_TMPFS_XATTR \
            -e CONFIG_TCP_MD5SIG
          
          # OnePlus specific
          ./scripts/config --file out/.config -e CONFIG_OPLUS_HOLI_CHARGER
          
          # Disable duplicate DRM (provided by techpack)
          ./scripts/config --file out/.config -d CONFIG_DRM_MSM
          
          # LTO/ThinLTO/CFI
          ./scripts/config --file out/.config \
            -e CONFIG_LTO \
            -e CONFIG_THINLTO \
            -e CONFIG_CFI_CLANG \
            -e CONFIG_SHADOW_CALL_STACK \
            -e CONFIG_COMPAT_VDSO
          
          make O=out olddefconfig

      - name: Build kernel
        run: |
          cd build/kernel-5.4
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabihf-
          
          CLANG_PATH="../kernel_platform/prebuilts-master/clang/host/linux-x86/clang-r416183c/bin"
          if [ -d "$CLANG_PATH" ]; then
            export PATH="$CLANG_PATH:$PATH"
          fi
          export CC=clang
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          
          BUILD_START=$(date +%s)
          make O=out -j$(nproc) 2>&1 | tee build.log
          BUILD_END=$(date +%s)
          
          echo "BUILD_TIME=$((BUILD_END - BUILD_START))" >> $GITHUB_ENV

      - name: Package AnyKernel3
        run: |
          cd build
          cp kernel-5.4/out/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          cp ../../anykernel.sh .
          zip -r9 ../n200-ksu-next-${{ github.run_number }}.zip . -x ".git/*" "*.md" "README*" "LICENSE"

      - name: Verify ZIP contents
        run: |
          unzip -l build/n200-ksu-next-${{ github.run_number }}.zip | grep -E "Image|anykernel.sh|update-binary"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: n200-kernel
          path: build/n200-ksu-next-*.zip
          retention-days: 7

  release:
    needs: build
    if: ${{ inputs.make_release == true && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: n200-kernel
          path: ./artifacts

      - name: Create Release
        run: |
          TAG="n200-ksu-next-r${{ github.run_number }}"
          gh release create "$TAG" ./artifacts/*.zip \
            --title "OnePlus Nord N200 Kernel with KernelSU-Next + SUSFS" \
            --notes "Flashable AnyKernel3 ZIP for OnePlus Nord N200 (dre/DE2117/SM4350) with KernelSU-Next + SUSFS, clang-20 LTO/CFI.

Built from: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
Kernel source: GarryStraitYT/android_kernel_oneplus_sm4350 (5.4.302-lineageos23.x + SUSFS backport)"